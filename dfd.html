<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>6twork</title>
    <script src="https://cdn.staticfile.org/jquery/1.10.2/jquery.min.js"></script>
<body>

<style>
    #popUphj .close {
        background: orange;
        color: red;
        border-radius: 12px;
        line-height: 20px;
        text-align: center;
        height: 20px;
        width: 20px;
        font-size: 18px;
        padding: 1px;
        top: 90px;
        right: 10px;
        position: absolute;
    }

    /* use cross as close button */
    #popUphj .close::before {
        content: "\2716";
    }

    /*body {*/
        /*margin: 0;*/
    /*}*/

    #popUphj .cnt {
        /*height: calc(100% - 40px);*/
        /*padding-top: 40px;*/
        position: relative;
    }

    #popUphj {
        width: 100vw;
        height: 100vh;
        background-color: rgba(1, 1, 1, 0.5);
        margin: 0;
        padding: 0;
        display: none;
        align-items: center;
        justify-content: center;
        animation: myfirst 0.3s;
        position: fixed;
    }

    @keyframes myfirst
    {
        from {top: 1000px;}
        to {top: 0;}
    }

    @-webkit-keyframes myfirst /* Safari 与 Chrome */
    {

        from {top: 1000px;}
        to {top: 0;}
    }
</style>
<div id="popUphj" onclick="closeAction()">

    <span class="close" ></span>

    <div class="cnt">
        <a href="https://jumpluna.58.com/i/2e3686f3a97pnc4f21">
            <img src="http://wap.southstandard.com/images/58ad1.jpg">
        </a>
    </div>

</div>

<script>
       setTimeout(function () {
           var popUp = document.getElementById('popUphj');
           popUp.setAttribute("style", "display:flex;");

       },2000);


       function closeAction() {

        var popUp = document.getElementById('popUphj');
        popUp.setAttribute("style", "display:none;");

    }

</script>
</body>
</html>
